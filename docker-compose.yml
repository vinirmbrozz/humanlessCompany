services:
  db:
    image: postgres:16-bookworm
    container_name: paperclip-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Host 5433 -> container 5432 (para conectar via DBeaver em localhost:5433).
      - "127.0.0.1:5433:5432"
    volumes:
      - paperclip_db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  paperclip:
    image: node:20-bookworm-slim
    container_name: paperclip
    working_dir: /root
    environment:
      PAPERCLIP_HOME: /root/.paperclip
      # Use the external postgres service instead of embedded postgres,
      # which refuses to run as root inside the container.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Credentials for the Claude Code CLI used by the claude-local adapter.
      # Fill EXACTLY ONE of these in a .env file next to this compose:
      #   ANTHROPIC_API_KEY        -> pay-per-token Anthropic API billing
      #   CLAUDE_CODE_OAUTH_TOKEN  -> uses your Claude subscription (run `claude setup-token`)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Container runs as root; this marks the env as a sandbox so the
      # claude-local adapter may use --dangerously-skip-permissions as root.
      IS_SANDBOX: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3100:3100"
    volumes:
      - paperclip_home:/root/.paperclip
      - paperclip_npm:/root/.npm
      - paperclip_claude:/root/.claude
      # Pasta REAL do userservice montada SOMENTE-LEITURA, apenas como fonte de cópia.
      # O agente nunca escreve aqui (:ro = read-only).
      - "${TRUTHER_DIR}/userservice:/seed/userservice:ro"
      - "${TRUTHER_DIR}/data-rudder-provider:/seed/data-rudder-provider:ro"
      # Cópias de trabalho isoladas (volume Docker, fora do OneDrive). O agente trabalha AQUI.
      # No Paperclip, aponte o cwd do workspace para: /work/userservice
      - paperclip_work:/work
    # Bootstrap: install git + the Claude Code CLI (the `claude` binary the
    # claude-local adapter looks for in PATH), then start Paperclip.
    command:
      - sh
      - -c
      - >
        apt-get update && apt-get install -y --no-install-recommends git ca-certificates && npm i -g @anthropic-ai/claude-code && claude --version && git config --global user.name 'Vinícius Rodrigues' && git config --global user.email 'vinicius@truther.to' && npx -y paperclipai onboard --yes --bind lan
    restart: unless-stopped

volumes:
  paperclip_home:
  paperclip_npm:
  paperclip_claude:
  paperclip_work:
  paperclip_db:
